<section style="padding:1rem">
  <div style="display:flex; gap:0.5rem">
    <button class="pill" (click)="switch('zh')">中文</button>
    <button class="pill" (click)="switch('en')">English</button>
  </div>

  <h2 i18n>标题C</h2>
  <p>{{ dict.app.description }}</p>
  <p i18n>欢迎C！</p>

  <h3>模板替换</h3>
  <p i18n>B：{{ '张三' }} 有 {{ 5 }} 条通知。</p>

  <h3>数组词条</h3>
  <ul>
    <li *ngFor="let it of dict.list.items; let i=index">
      {{ replace(dict.templates.itemTpl, { index: i, value: it }) }}
    </li>
  </ul>
</section>
